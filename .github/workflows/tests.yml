name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install cairn package (editable)
        # Without this, `pytest tests/ -v` fails with
        # "ModuleNotFoundError: No module named 'cairn'" — unlike
        # `python -m pytest`, plain `pytest` invoked as a script doesn't
        # add the repo root to sys.path in GitHub Actions' environment,
        # so the local package needs to be properly installed instead.
        # Confirmed as the root cause 2026-07-13 against a real failing
        # run (both tests/test_agent.py and tests/test_governance.py
        # failed identically at collection time with this error).
        run: |
          pip install -e .

      - name: Run tests
        run: |
          pytest tests/ -v

      # NOTE: capsule.py and governance.py are covered end-to-end, no
      # live DataHub connection needed for either.
      #
      # agent.py's Sentinel._find_query_drift() is also covered here
      # (tests/test_agent.py), using mock MCP responses shaped exactly
      # like the ones returned by a real mcp-server-datahub v0.6.0
      # instance (verified manually against a running quickstart on
      # 2026-07-13 -- see DEVELOPMENT_NOTES.md). Mock data was used
      # instead of a live connection because the healthcare/quickstart
      # sample pack didn't happen to contain a dataset with both
      # undocumented fields and query history at the same time -- CI
      # shouldn't depend on that coincidence anyway.
      #
      # Sentinel._find_documentation_gaps() is also covered here, with
      # the anthropic client monkeypatched -- no real API key or
      # network access needed in CI for this either.