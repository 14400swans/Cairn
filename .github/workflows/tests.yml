name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v

      # NOTE: these tests cover capsule.py and governance.py only --
      # the two modules that don't require a live DataHub connection.
      # agent.py's finding strategies are stubs (see DEVELOPMENT_NOTES.md)
      # and are intentionally not exercised here yet.
